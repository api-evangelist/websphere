description: IBM WebSphere is a family of Jakarta EE application servers (WebSphere Application Server,
  WebSphere Liberty, WebSphere Hybrid Edition) sold under IBM commercial license. Programmatic surfaces
  (admin REST, JMX, JAX-RS / MicroProfile hosting) ship inside the product and run inside the customer's
  deployment — there is no public, self-serve API plan or per-call price. Acquisition is via IBM Passport
  Advantage, IBM Cloud Paks, or IBM sales.
notes: ibm.com pricing pages 403'd on automated fetch. No self-serve developer plans. Scaffold reduced
  to one Contact Sales plan.
sources:
  - https://www.ibm.com/products/websphere-application-server
plans:
  - id: websphere-contact-sales
    name: Contact Sales
    type: enterprise
    description: IBM WebSphere license + support, available through Passport Advantage or as part of
      Cloud Pak for Applications. Sized per PVU / VPC / Container core.
    entries:
      - label: WebSphere License
        name: websphere_license
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see IBM Passport Advantage / Cloud Pak pricing
        userMultiplied: false
    elements:
      - name: IBM Software Support
      - name: WebSphere Software License
      - name: Admin REST / JMX APIs (bundled)
      - name: IBM Account Team
