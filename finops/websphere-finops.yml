meters:
  - name: websphere_license
    description: WebSphere license entitlement, sized per PVU / VPC / Container core via IBM Passport
      Advantage or Cloud Pak for Applications.
    unit: varies
    aggregation: sum
  - name: websphere_subscription_and_support
    description: IBM Subscription & Support renewal on the WebSphere entitlement.
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Spend visibility comes from IBM Passport Advantage entitlement reports and the
      customer's IBM License Metric Tool (ILMT) deployment.
  - name: Allocation
    description: Allocate WebSphere spend by cell, deployment, or business application using ILMT
      tagging and CMDB ownership records.
  - name: Optimization
    description: Cost levers include sub-capacity licensing via ILMT, migration from WAS Traditional to
      WebSphere Liberty, Cloud Pak entitlement sharing, and consolidation at S&S renewal.
  - name: Accountability
    description: Middleware platform owners and IBM software-asset-management leads coordinate true-ups
      and renewals with IBM account management.
