description: FinOps placement for IBM WebSphere. WebSphere is sold as a perpetual / subscription
  software license (per PVU / VPC / Container core) through IBM Passport Advantage or Cloud Paks; spend
  tracks license entitlement, S&S renewals, and underlying infrastructure rather than a metered API
  surface.
notes: ibm.com pricing 403 on fetch. FOCUS mapping reflects software-license shape; no public usage
  API meters available.
