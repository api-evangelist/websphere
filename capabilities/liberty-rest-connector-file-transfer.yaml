naftiko: 1.0.0-alpha2
info:
  label: WebSphere Liberty REST Connector API — File Transfer
  description: 'WebSphere Liberty REST Connector API — File Transfer. 3 operations. Lead operation: Delete a File. Self-contained
    Naftiko capability covering one Websphere business surface.'
  tags:
  - Websphere
  - File Transfer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBSPHERE_API_KEY: WEBSPHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: liberty-rest-connector-file-transfer
    baseUri: https://localhost:9443/IBMJMXConnectorREST/api
    description: WebSphere Liberty REST Connector API — File Transfer business capability. Self-contained, no shared references.
    resources:
    - name: file-delete
      path: /file/delete
      operations:
      - name: deletefile
        method: DELETE
        description: Delete a File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: path
          in: query
          type: string
          description: File path on the server
          required: true
    - name: file-download
      path: /file/download
      operations:
      - name: downloadfile
        method: GET
        description: Download a File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sourcePath
          in: query
          type: string
          description: Source file path on the server
          required: true
    - name: file-upload
      path: /file/upload
      operations:
      - name: uploadfile
        method: POST
        description: Upload a File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: targetPath
          in: query
          type: string
          description: Target file path on the server
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.WEBSPHERE_USER}}'
      password: '{{env.WEBSPHERE_PASS}}'
  exposes:
  - type: rest
    namespace: liberty-rest-connector-file-transfer-rest
    port: 8080
    description: REST adapter for WebSphere Liberty REST Connector API — File Transfer. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/file/delete
      name: file-delete
      description: REST surface for file-delete.
      operations:
      - method: DELETE
        name: deletefile
        description: Delete a File
        call: liberty-rest-connector-file-transfer.deletefile
        with:
          path: rest.path
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/file/download
      name: file-download
      description: REST surface for file-download.
      operations:
      - method: GET
        name: downloadfile
        description: Download a File
        call: liberty-rest-connector-file-transfer.downloadfile
        with:
          sourcePath: rest.sourcePath
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/file/upload
      name: file-upload
      description: REST surface for file-upload.
      operations:
      - method: POST
        name: uploadfile
        description: Upload a File
        call: liberty-rest-connector-file-transfer.uploadfile
        with:
          targetPath: rest.targetPath
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: liberty-rest-connector-file-transfer-mcp
    port: 9090
    transport: http
    description: MCP adapter for WebSphere Liberty REST Connector API — File Transfer. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: delete-file
      description: Delete a File
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: liberty-rest-connector-file-transfer.deletefile
      with:
        path: tools.path
      outputParameters:
      - type: object
        mapping: $.
    - name: download-file
      description: Download a File
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: liberty-rest-connector-file-transfer.downloadfile
      with:
        sourcePath: tools.sourcePath
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-file
      description: Upload a File
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: liberty-rest-connector-file-transfer.uploadfile
      with:
        targetPath: tools.targetPath
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
