naftiko: 1.0.0-alpha2
info:
  label: IBM MQ REST API — Topics
  description: 'IBM MQ REST API — Topics. 4 operations. Lead operation: List Topics. Self-contained Naftiko capability covering
    one Websphere business surface.'
  tags:
  - Websphere
  - Topics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBSPHERE_API_KEY: WEBSPHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: mq-rest-topics
    baseUri: https://localhost:9443/ibmmq/rest/v2
    description: IBM MQ REST API — Topics business capability. Self-contained, no shared references.
    resources:
    - name: admin-qmgr-qmgrName-topic
      path: /admin/qmgr/{qmgrName}/topic
      operations:
      - name: listtopics
        method: GET
        description: List Topics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Topic name filter
      - name: createtopic
        method: POST
        description: Create a Topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin-qmgr-qmgrName-topic-topicName
      path: /admin/qmgr/{qmgrName}/topic/{topicName}
      operations:
      - name: gettopic
        method: GET
        description: Get Topic Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: topicName
          in: path
          type: string
          description: Topic object name
          required: true
      - name: deletetopic
        method: DELETE
        description: Delete a Topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: topicName
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: LtpaToken2
      value: '{{env.WEBSPHERE_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: mq-rest-topics-rest
    port: 8080
    description: REST adapter for IBM MQ REST API — Topics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/qmgr/{qmgrname}/topic
      name: admin-qmgr-qmgrname-topic
      description: REST surface for admin-qmgr-qmgrName-topic.
      operations:
      - method: GET
        name: listtopics
        description: List Topics
        call: mq-rest-topics.listtopics
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtopic
        description: Create a Topic
        call: mq-rest-topics.createtopic
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/qmgr/{qmgrname}/topic/{topicname}
      name: admin-qmgr-qmgrname-topic-topicname
      description: REST surface for admin-qmgr-qmgrName-topic-topicName.
      operations:
      - method: GET
        name: gettopic
        description: Get Topic Details
        call: mq-rest-topics.gettopic
        with:
          topicName: rest.topicName
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetopic
        description: Delete a Topic
        call: mq-rest-topics.deletetopic
        with:
          topicName: rest.topicName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mq-rest-topics-mcp
    port: 9090
    transport: http
    description: MCP adapter for IBM MQ REST API — Topics. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-topics
      description: List Topics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mq-rest-topics.listtopics
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: create-topic
      description: Create a Topic
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mq-rest-topics.createtopic
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-topic-details
      description: Get Topic Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mq-rest-topics.gettopic
      with:
        topicName: tools.topicName
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-topic
      description: Delete a Topic
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: mq-rest-topics.deletetopic
      with:
        topicName: tools.topicName
      outputParameters:
      - type: object
        mapping: $.
