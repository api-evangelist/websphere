naftiko: 1.0.0-alpha2
info:
  label: WebSphere Automation REST API — Fixes
  description: 'WebSphere Automation REST API — Fixes. 3 operations. Lead operation: List Available Fixes. Self-contained
    Naftiko capability covering one Websphere business surface.'
  tags:
  - Websphere
  - Fixes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBSPHERE_API_KEY: WEBSPHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: automation-rest-fixes
    baseUri: https://automation-api.example.com/v1
    description: WebSphere Automation REST API — Fixes business capability. Self-contained, no shared references.
    resources:
    - name: fixes
      path: /fixes
      operations:
      - name: listfixes
        method: GET
        description: List Available Fixes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: serverId
          in: query
          type: string
          description: Filter by applicable server
        - name: type
          in: query
          type: string
          description: Filter by fix type
    - name: fixes-fixId
      path: /fixes/{fixId}
      operations:
      - name: getfix
        method: GET
        description: Get Fix Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fixId
          in: path
          type: string
          description: Fix identifier
          required: true
    - name: fixes-fixId-apply
      path: /fixes/{fixId}/apply
      operations:
      - name: applyfix
        method: POST
        description: Apply a Fix
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fixId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WEBSPHERE_API_KEY}}'
  exposes:
  - type: rest
    namespace: automation-rest-fixes-rest
    port: 8080
    description: REST adapter for WebSphere Automation REST API — Fixes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/fixes
      name: fixes
      description: REST surface for fixes.
      operations:
      - method: GET
        name: listfixes
        description: List Available Fixes
        call: automation-rest-fixes.listfixes
        with:
          serverId: rest.serverId
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fixes/{fixid}
      name: fixes-fixid
      description: REST surface for fixes-fixId.
      operations:
      - method: GET
        name: getfix
        description: Get Fix Details
        call: automation-rest-fixes.getfix
        with:
          fixId: rest.fixId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fixes/{fixid}/apply
      name: fixes-fixid-apply
      description: REST surface for fixes-fixId-apply.
      operations:
      - method: POST
        name: applyfix
        description: Apply a Fix
        call: automation-rest-fixes.applyfix
        with:
          fixId: rest.fixId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: automation-rest-fixes-mcp
    port: 9090
    transport: http
    description: MCP adapter for WebSphere Automation REST API — Fixes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-available-fixes
      description: List Available Fixes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: automation-rest-fixes.listfixes
      with:
        serverId: tools.serverId
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: get-fix-details
      description: Get Fix Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: automation-rest-fixes.getfix
      with:
        fixId: tools.fixId
      outputParameters:
      - type: object
        mapping: $.
    - name: apply-fix
      description: Apply a Fix
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: automation-rest-fixes.applyfix
      with:
        fixId: tools.fixId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
