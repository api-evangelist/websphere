naftiko: 1.0.0-alpha2
info:
  label: Open Liberty APIs — Metrics
  description: 'Open Liberty APIs — Metrics. 4 operations. Lead operation: Get All Metrics. Self-contained Naftiko capability
    covering one Websphere business surface.'
  tags:
  - Websphere
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBSPHERE_API_KEY: WEBSPHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-liberty-apis-metrics
    baseUri: https://localhost:9443
    description: Open Liberty APIs — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: metrics
      path: /metrics
      operations:
      - name: getallmetrics
        method: GET
        description: Get All Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Accept
          in: header
          type: string
          description: Response format
        - name: scope
          in: query
          type: string
          description: Metrics scope filter
    - name: metrics-application
      path: /metrics/application
      operations:
      - name: getapplicationmetrics
        method: GET
        description: Get Application Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics-base
      path: /metrics/base
      operations:
      - name: getbasemetrics
        method: GET
        description: Get Base Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metrics-vendor
      path: /metrics/vendor
      operations:
      - name: getvendormetrics
        method: GET
        description: Get Vendor Metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WEBSPHERE_API_KEY}}'
  exposes:
  - type: rest
    namespace: open-liberty-apis-metrics-rest
    port: 8080
    description: REST adapter for Open Liberty APIs — Metrics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/metrics
      name: metrics
      description: REST surface for metrics.
      operations:
      - method: GET
        name: getallmetrics
        description: Get All Metrics
        call: open-liberty-apis-metrics.getallmetrics
        with:
          Accept: rest.Accept
          scope: rest.scope
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/application
      name: metrics-application
      description: REST surface for metrics-application.
      operations:
      - method: GET
        name: getapplicationmetrics
        description: Get Application Metrics
        call: open-liberty-apis-metrics.getapplicationmetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/base
      name: metrics-base
      description: REST surface for metrics-base.
      operations:
      - method: GET
        name: getbasemetrics
        description: Get Base Metrics
        call: open-liberty-apis-metrics.getbasemetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metrics/vendor
      name: metrics-vendor
      description: REST surface for metrics-vendor.
      operations:
      - method: GET
        name: getvendormetrics
        description: Get Vendor Metrics
        call: open-liberty-apis-metrics.getvendormetrics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-liberty-apis-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Liberty APIs — Metrics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-all-metrics
      description: Get All Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-liberty-apis-metrics.getallmetrics
      with:
        Accept: tools.Accept
        scope: tools.scope
      outputParameters:
      - type: object
        mapping: $.
    - name: get-application-metrics
      description: Get Application Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-liberty-apis-metrics.getapplicationmetrics
      outputParameters:
      - type: object
        mapping: $.
    - name: get-base-metrics
      description: Get Base Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-liberty-apis-metrics.getbasemetrics
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vendor-metrics
      description: Get Vendor Metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-liberty-apis-metrics.getvendormetrics
      outputParameters:
      - type: object
        mapping: $.
