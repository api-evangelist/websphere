naftiko: "1.0.0-alpha1"

info:
  label: "Open Liberty APIs"
  description: "Open Liberty APIs for health checks, metrics, OpenAPI documentation, configuration, and batch job management."
  tags:
    - Open Liberty
    - MicroProfile
    - Jakarta EE
    - Cloud Native
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LIBERTY_USERNAME: LIBERTY_USERNAME
      LIBERTY_PASSWORD: LIBERTY_PASSWORD

capability:
  consumes:
    - type: http
      namespace: open-liberty
      baseUri: https://localhost:9443
      description: "Open Liberty server APIs for health, metrics, batch, and configuration"
      authentication:
        type: basic
        username: "{{LIBERTY_USERNAME}}"
        password: "{{LIBERTY_PASSWORD}}"
      resources:
        - name: health
          path: /health
          description: "MicroProfile Health Check API"
          operations:
            - name: get-overall-health
              method: GET
              description: "Get overall health status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-readiness
              method: GET
              description: "Get readiness status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-liveness
              method: GET
              description: "Get liveness status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-started
              method: GET
              description: "Get startup status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: metrics
          path: /metrics
          description: "MicroProfile Metrics API"
          operations:
            - name: get-all-metrics
              method: GET
              description: "Get all metrics"
              inputParameters:
                - name: scope
                  in: query
                  type: string
                  required: false
                  description: "Metrics scope filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-base-metrics
              method: GET
              description: "Get base metrics"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-vendor-metrics
              method: GET
              description: "Get vendor metrics"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-application-metrics
              method: GET
              description: "Get application metrics"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: batch
          path: /ibm/api/batch
          description: "Jakarta Batch job management"
          operations:
            - name: list-batch-job-instances
              method: GET
              description: "List batch job instances"
              inputParameters:
                - name: jobName
                  in: query
                  type: string
                  required: false
                  description: "Filter by job name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-batch-job-instance
              method: GET
              description: "Get batch job instance details"
              inputParameters:
                - name: jobInstanceId
                  in: path
                  type: integer
                  required: true
                  description: "Job instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-batch-job-executions
              method: GET
              description: "List job executions for an instance"
              inputParameters:
                - name: jobInstanceId
                  in: path
                  type: integer
                  required: true
                  description: "Job instance ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: stop-batch-job-execution
              method: PUT
              description: "Stop a running batch job"
              inputParameters:
                - name: executionId
                  in: path
                  type: integer
                  required: true
                  description: "Execution ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: restart-batch-job-execution
              method: PUT
              description: "Restart a failed batch job"
              inputParameters:
                - name: executionId
                  in: path
                  type: integer
                  required: true
                  description: "Execution ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8106
      namespace: open-liberty-api
      resources:
        - path: /v1/health
          name: health
          description: "Health check endpoints"
          operations:
            - method: GET
              name: get-overall-health
              description: "Get overall health status"
              call: "open-liberty.get-overall-health"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9106
      namespace: open-liberty-mcp
      transport: http
      tools:
        - name: get-overall-health
          description: "Get overall health status"
          hints:
            readOnly: true
          call: "open-liberty.get-overall-health"
          outputParameters:
            - type: object
              mapping: "$."
