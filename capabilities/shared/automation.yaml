naftiko: "1.0.0-alpha1"

info:
  label: "WebSphere Automation REST API"
  description: "API for vulnerability management, automated patching, health monitoring, and compliance tracking for WebSphere environments."
  tags:
    - IBM WebSphere
    - Automation
    - Vulnerability Management
    - Compliance
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      WEBSPHERE_AUTOMATION_TOKEN: WEBSPHERE_AUTOMATION_TOKEN

capability:
  consumes:
    - type: http
      namespace: automation
      baseUri: https://automation-api.example.com/v1
      description: "WebSphere Automation REST API for vulnerability and fix management"
      authentication:
        type: bearer
        token: "{{WEBSPHERE_AUTOMATION_TOKEN}}"
      resources:
        - name: servers
          path: /servers
          description: "Managed server inventory"
          operations:
            - name: list-managed-servers
              method: GET
              description: "List managed servers"
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Filter by server type"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: register-server
              method: POST
              description: "Register a server for management"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"
            - name: get-managed-server
              method: GET
              description: "Get managed server details"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "Server identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deregister-server
              method: DELETE
              description: "Deregister a server"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "Server identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: vulnerabilities
          path: /vulnerabilities
          description: "Vulnerability tracking"
          operations:
            - name: list-vulnerabilities
              method: GET
              description: "List known vulnerabilities"
              inputParameters:
                - name: severity
                  in: query
                  type: string
                  required: false
                  description: "Filter by severity"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by remediation status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-vulnerability
              method: GET
              description: "Get vulnerability details"
              inputParameters:
                - name: vulnerabilityId
                  in: path
                  type: string
                  required: true
                  description: "Vulnerability identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: resolve-vulnerability
              method: POST
              description: "Initiate vulnerability resolution"
              inputParameters:
                - name: vulnerabilityId
                  in: path
                  type: string
                  required: true
                  description: "Vulnerability identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: fixes
          path: /fixes
          description: "Fix management"
          operations:
            - name: list-fixes
              method: GET
              description: "List available fixes"
              inputParameters:
                - name: serverId
                  in: query
                  type: string
                  required: false
                  description: "Filter by applicable server"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-fix
              method: GET
              description: "Get fix details"
              inputParameters:
                - name: fixId
                  in: path
                  type: string
                  required: true
                  description: "Fix identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: apply-fix
              method: POST
              description: "Apply a fix to servers"
              inputParameters:
                - name: fixId
                  in: path
                  type: string
                  required: true
                  description: "Fix identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: health
          path: /health
          description: "Health monitoring"
          operations:
            - name: get-overall-health
              method: GET
              description: "Get overall health status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-server-health
              method: GET
              description: "Get server health status"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "Server identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: compliance
          path: /compliance/reports
          description: "Compliance reporting"
          operations:
            - name: list-compliance-reports
              method: GET
              description: "List compliance reports"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-compliance-report
              method: GET
              description: "Get compliance report details"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Report identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8105
      namespace: automation-api
      resources:
        - path: /v1/vulnerabilities
          name: vulnerabilities
          description: "Vulnerability management"
          operations:
            - method: GET
              name: list-vulnerabilities
              description: "List vulnerabilities"
              call: "automation.list-vulnerabilities"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: automation-mcp
      transport: http
      tools:
        - name: list-vulnerabilities
          description: "List known vulnerabilities"
          hints:
            readOnly: true
          call: "automation.list-vulnerabilities"
          outputParameters:
            - type: object
              mapping: "$."
