naftiko: "1.0.0-alpha1"

info:
  label: "WebSphere Liberty Admin REST API"
  description: "RESTful administrative API for WebSphere Liberty servers providing configuration, application management, and runtime operations."
  tags:
    - IBM WebSphere
    - Liberty
    - Administration
    - Configuration
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      LIBERTY_USERNAME: LIBERTY_USERNAME
      LIBERTY_PASSWORD: LIBERTY_PASSWORD

capability:
  consumes:
    - type: http
      namespace: liberty-admin
      baseUri: https://localhost:9443/ibm/api
      description: "Liberty Admin REST API for server configuration and management"
      authentication:
        type: basic
        username: "{{LIBERTY_USERNAME}}"
        password: "{{LIBERTY_PASSWORD}}"
      resources:
        - name: server
          path: /server
          description: "Server runtime management"
          operations:
            - name: get-server-info
              method: GET
              description: "Get Liberty server information"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-server-dump
              method: POST
              description: "Create a server dump for diagnostics"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  include: "{{tools.include}}"
            - name: create-java-dump
              method: POST
              description: "Create a Java core dump"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: config
          path: /config
          description: "Server configuration management"
          operations:
            - name: get-server-config
              method: GET
              description: "Get server configuration"
              inputParameters:
                - name: depth
                  in: query
                  type: integer
                  required: false
                  description: "Depth of nested elements"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-server-config
              method: PUT
              description: "Update server configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-config-element
              method: GET
              description: "Get a specific configuration element"
              inputParameters:
                - name: elementName
                  in: path
                  type: string
                  required: true
                  description: "Configuration element name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-config-element
              method: POST
              description: "Create a configuration element"
              inputParameters:
                - name: elementName
                  in: path
                  type: string
                  required: true
                  description: "Configuration element name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-config-element
              method: DELETE
              description: "Delete a configuration element"
              inputParameters:
                - name: elementName
                  in: path
                  type: string
                  required: true
                  description: "Configuration element name"
                - name: uid
                  in: path
                  type: string
                  required: true
                  description: "Element unique identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: applications
          path: /applications
          description: "Application deployment and lifecycle"
          operations:
            - name: list-applications
              method: GET
              description: "List deployed applications"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-application
              method: GET
              description: "Get application details"
              inputParameters:
                - name: appName
                  in: path
                  type: string
                  required: true
                  description: "Application name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: start-application
              method: POST
              description: "Start an application"
              inputParameters:
                - name: appName
                  in: path
                  type: string
                  required: true
                  description: "Application name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: stop-application
              method: POST
              description: "Stop an application"
              inputParameters:
                - name: appName
                  in: path
                  type: string
                  required: true
                  description: "Application name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: restart-application
              method: POST
              description: "Restart an application"
              inputParameters:
                - name: appName
                  in: path
                  type: string
                  required: true
                  description: "Application name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: features
          path: /features
          description: "Liberty feature management"
          operations:
            - name: list-features
              method: GET
              description: "List installed features"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-feature
              method: GET
              description: "Get feature details"
              inputParameters:
                - name: featureName
                  in: path
                  type: string
                  required: true
                  description: "Feature symbolic name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: logging
          path: /logging
          description: "Log access and configuration"
          operations:
            - name: get-log-config
              method: GET
              description: "Get logging configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-log-config
              method: PUT
              description: "Update logging configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-log-messages
              method: GET
              description: "Get recent log messages"
              inputParameters:
                - name: maxMessages
                  in: query
                  type: integer
                  required: false
                  description: "Maximum messages to return"
                - name: level
                  in: query
                  type: string
                  required: false
                  description: "Minimum log level"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: monitoring
          path: /monitoring
          description: "Server monitoring and metrics"
          operations:
            - name: get-metrics
              method: GET
              description: "Get MicroProfile Metrics data"
              inputParameters:
                - name: scope
                  in: query
                  type: string
                  required: false
                  description: "Metrics scope (base, vendor, application)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-health
              method: GET
              description: "Get MicroProfile Health check results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: liberty-admin-api
      resources:
        - path: /v1/server
          name: server
          description: "Liberty server information"
          operations:
            - method: GET
              name: get-server-info
              description: "Get server information"
              call: "liberty-admin.get-server-info"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: liberty-admin-mcp
      transport: http
      tools:
        - name: get-server-info
          description: "Get Liberty server information"
          hints:
            readOnly: true
          call: "liberty-admin.get-server-info"
          outputParameters:
            - type: object
              mapping: "$."
