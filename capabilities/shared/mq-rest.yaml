naftiko: "1.0.0-alpha1"

info:
  label: "IBM MQ REST API"
  description: "REST API for IBM MQ messaging operations including queue management, message operations, channels, and topics."
  tags:
    - IBM MQ
    - Messaging
    - Queue Management
    - Publish Subscribe
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MQ_USERNAME: MQ_USERNAME
      MQ_PASSWORD: MQ_PASSWORD

capability:
  consumes:
    - type: http
      namespace: mq-rest
      baseUri: https://localhost:9443/ibmmq/rest/v2
      description: "IBM MQ REST API for messaging and administration"
      authentication:
        type: basic
        username: "{{MQ_USERNAME}}"
        password: "{{MQ_PASSWORD}}"
      resources:
        - name: queue-managers
          path: /admin/qmgr
          description: "Queue manager administration"
          operations:
            - name: list-queue-managers
              method: GET
              description: "List queue managers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-queue-manager
              method: GET
              description: "Get queue manager details"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: queues
          path: /admin/qmgr/{qmgrName}/queue
          description: "Queue administration"
          operations:
            - name: list-queues
              method: GET
              description: "List queues on a queue manager"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Queue name filter"
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Queue type filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-queue
              method: POST
              description: "Create a new queue"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"
            - name: get-queue
              method: GET
              description: "Get queue details"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
                - name: queueName
                  in: path
                  type: string
                  required: true
                  description: "Queue name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-queue
              method: DELETE
              description: "Delete a queue"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
                - name: queueName
                  in: path
                  type: string
                  required: true
                  description: "Queue name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: messages
          path: /messaging/qmgr/{qmgrName}/queue/{queueName}/message
          description: "Message operations"
          operations:
            - name: send-message
              method: POST
              description: "Send a message to a queue"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
                - name: queueName
                  in: path
                  type: string
                  required: true
                  description: "Queue name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: browse-messages
              method: GET
              description: "Browse messages on a queue"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
                - name: queueName
                  in: path
                  type: string
                  required: true
                  description: "Queue name"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum messages to browse"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: receive-message
              method: DELETE
              description: "Destructively get a message from a queue"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
                - name: queueName
                  in: path
                  type: string
                  required: true
                  description: "Queue name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: channels
          path: /admin/qmgr/{qmgrName}/channel
          description: "Channel administration"
          operations:
            - name: list-channels
              method: GET
              description: "List channels"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-channel
              method: POST
              description: "Create a channel"
              inputParameters:
                - name: qmgrName
                  in: path
                  type: string
                  required: true
                  description: "Queue manager name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"

  exposes:
    - type: rest
      port: 8103
      namespace: mq-rest-api
      resources:
        - path: /v1/queue-managers
          name: queue-managers
          description: "Queue manager operations"
          operations:
            - method: GET
              name: list-queue-managers
              description: "List queue managers"
              call: "mq-rest.list-queue-managers"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: mq-rest-mcp
      transport: http
      tools:
        - name: list-queue-managers
          description: "List queue managers"
          hints:
            readOnly: true
          call: "mq-rest.list-queue-managers"
          outputParameters:
            - type: object
              mapping: "$."
