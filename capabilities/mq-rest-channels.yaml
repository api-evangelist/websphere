      operations:
      - name: listchannels
        method: GET
        description: List Channels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Channel name filter
        - name: type
          in: query
          type: string
          description: Channel type filter
      - name: createchannel
        method: POST
        description: Create a Channel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin-qmgr-qmgrName-channel-channelName
      path: /admin/qmgr/{qmgrName}/channel/{channelName}
      operations:
      - name: getchannel
        method: GET
        description: Get Channel Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channelName
          in: path
          type: string
          description: Channel name
          required: true
      - name: deletechannel
        method: DELETE
        description: Delete a Channel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channelName
          in: path
          type: string
          required: true
    - name: admin-qmgr-qmgrName-channel-channelName-start
      path: /admin/qmgr/{qmgrName}/channel/{channelName}/start
      operations:
      - name: startchannel
        method: POST
        description: Start a Channel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channelName
          in: path
          type: string
          required: true
    - name: admin-qmgr-qmgrName-channel-channelName-stop
      path: /admin/qmgr/{qmgrName}/channel/{channelName}/stop
      operations:
      - name: stopchannel
        method: POST
        description: Stop a Channel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
