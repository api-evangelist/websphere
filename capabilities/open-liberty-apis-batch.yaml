          in: path
          type: integer
          required: true
    - name: ibm-api-batch-jobinstances
      path: /ibm/api/batch/jobinstances
      operations:
      - name: listbatchjobinstances
        method: GET
        description: List Batch Job Instances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobName
          in: query
          type: string
          description: Filter by job name
        - name: page
          in: query
          type: integer
          description: Page number
        - name: pageSize
          in: query
          type: integer
          description: Number of items per page
        - name: sortBy
          in: query
          type: string
          description: Sort field
    - name: ibm-api-batch-jobinstances-jobInstanceId
      path: /ibm/api/batch/jobinstances/{jobInstanceId}
      operations:
      - name: getbatchjobinstance
        method: GET
        description: Get Batch Job Instance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
