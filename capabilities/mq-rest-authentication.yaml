naftiko: 1.0.0-alpha2
info:
  label: IBM MQ REST API — Authentication
  description: 'IBM MQ REST API — Authentication. 2 operations. Lead operation: Authenticate and Get Ltpa Token. Self-contained
    Naftiko capability covering one Websphere business surface.'
  tags:
  - Websphere
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBSPHERE_API_KEY: WEBSPHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: mq-rest-authentication
    baseUri: https://localhost:9443/ibmmq/rest/v2
    description: IBM MQ REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: login
      path: /login
      operations:
      - name: login
        method: POST
        description: Authenticate and Get Ltpa Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: logout
      path: /logout
      operations:
      - name: logout
        method: POST
        description: Logout and Invalidate Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: LtpaToken2
      value: '{{env.WEBSPHERE_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: mq-rest-authentication-rest
    port: 8080
    description: REST adapter for IBM MQ REST API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/login
      name: login
      description: REST surface for login.
      operations:
      - method: POST
        name: login
        description: Authenticate and Get Ltpa Token
        call: mq-rest-authentication.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logout
      name: logout
      description: REST surface for logout.
      operations:
      - method: POST
        name: logout
        description: Logout and Invalidate Token
        call: mq-rest-authentication.logout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mq-rest-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for IBM MQ REST API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: authenticate-and-get-ltpa-token
      description: Authenticate and Get Ltpa Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: mq-rest-authentication.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: logout-and-invalidate-token
      description: Logout and Invalidate Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: mq-rest-authentication.logout
      outputParameters:
      - type: object
        mapping: $.
