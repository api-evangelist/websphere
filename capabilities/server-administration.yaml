naftiko: 1.0.0-alpha2
info:
  label: WebSphere Server Administration
  description: Unified workflow for administering WebSphere Application Server and Liberty environments, combining traditional
    admin, Liberty admin, collective controller, and JMX connector APIs for platform administrators.
  tags:
  - IBM WebSphere
  - Administration
  - Server Management
  - Liberty
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WEBSPHERE_USERNAME: WEBSPHERE_USERNAME
    WEBSPHERE_PASSWORD: WEBSPHERE_PASSWORD
    LIBERTY_USERNAME: LIBERTY_USERNAME
    LIBERTY_PASSWORD: LIBERTY_PASSWORD
capability:
  consumes:
  - type: http
    namespace: admin-rest
    baseUri: https://localhost:9443/ibm/api
    description: REST API for WebSphere Application Server administration
    authentication:
      type: basic
      username: '{{WEBSPHERE_USERNAME}}'
      password: '{{WEBSPHERE_PASSWORD}}'
    resources:
    - name: applications
      path: /applications
      description: Application deployment and lifecycle management
      operations:
      - name: list-applications
        method: GET
        description: List deployed applications
        inputParameters:
        - name: status
          in: query
          type: string
          required: false
          description: Filter by application status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-application
        method: GET
        description: Get application details
        inputParameters:
        - name: appName
          in: path
          type: string
          required: true
          description: Application name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deploy-application
        method: POST
        description: Deploy a new application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            contextRoot: '{{tools.contextRoot}}'
            targetServer: '{{tools.targetServer}}'
      - name: start-application
        method: POST
        description: Start a deployed application
        inputParameters:
        - name: appName
          in: path
          type: string
          required: true
          description: Application name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: stop-application
        method: POST
        description: Stop a running application
        inputParameters:
        - name: appName
          in: path
          type: string
          required: true
          description: Application name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uninstall-application
        method: DELETE
        description: Uninstall a deployed application
        inputParameters:
        - name: appName
          in: path
          type: string
          required: true
          description: Application name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: servers
      path: /servers
      description: Server configuration and management
      operations:
      - name: list-servers
        method: GET
        description: List all servers in the cell
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-server
        method: GET
        description: Get server details
        inputParameters:
        - name: serverName
          in: path
          type: string
          required: true
          description: Server name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: start-server
        method: POST
        description: Start a server
        inputParameters:
        - name: serverName
          in: path
          type: string
          required: true
          description: Server name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: stop-server
        method: POST
        description: Stop a server
        inputParameters:
        - name: serverName
          in: path
          type: string
          required: true
          description: Server name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clusters
      path: /clusters
      description: Cluster management operations
      operations:
      - name: list-clusters
        method: GET
        description: List all clusters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-cluster
        method: GET
        description: Get cluster details
        inputParameters:
        - name: clusterName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: start-cluster
        method: POST
        description: Start all members of a cluster
        inputParameters:
        - name: clusterName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: stop-cluster
        method: POST
        description: Stop all members of a cluster
        inputParameters:
        - name: clusterName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitoring
      path: /monitoring
      description: Performance monitoring and health checks
      operations:
      - name: get-performance-data
        method: GET
        description: Get performance monitoring data
        inputParameters:
        - name: module
          in: query
          type: string
          required: false
          description: Performance module name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-health-status
        method: GET
        description: Get server health status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: configuration
      path: /config
      description: Server configuration management
      operations:
      - name: list-config-resources
        method: GET
        description: List configuration resource types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-config-resources
        method: GET
        description: List resources of a specific type
        inputParameters:
        - name: resourceType
          in: path
          type: string
          required: true
          description: Configuration resource type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: liberty-admin
    baseUri: https://localhost:9443/ibm/api
    description: Liberty Admin REST API for server configuration and management
    authentication:
      type: basic
      username: '{{LIBERTY_USERNAME}}'
      password: '{{LIBERTY_PASSWORD}}'
    resources:
    - name: server
      path: /server
      description: Server runtime management
      operations:
      - name: get-server-info
        method: GET
        description: Get Liberty server information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-server-dump
        method: POST
        description: Create a server dump for diagnostics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            include: '{{tools.include}}'
      - name: create-java-dump
        method: POST
        description: Create a Java core dump
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: config
      path: /config
      description: Server configuration management
      operations:
      - name: get-server-config
        method: GET
        description: Get server configuration
        inputParameters:
        - name: depth
          in: query
          type: integer
          required: false
          description: Depth of nested elements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-server-config
        method: PUT
        description: Update server configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-config-element
        method: GET
        description: Get a specific configuration element
        inputParameters:
        - name: elementName
          in: path
          type: string
          required: true
          description: Configuration element name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-config-element
        method: POST
        description: Create a configuration element
        inputParameters:
        - name: elementName
          in: path
          type: string
          required: true
          description: Configuration element name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-config-element
        method: DELETE
        description: Delete a configuration element
        inputParameters:
        - name: elementName
          in: path
          type: string
          required: true
          description: Configuration element name
        - name: uid
          in: path
          type: string
          required: true
          description: Element unique identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications
      path: /applications
      description: Application deployment and lifecycle
      operations:
      - name: list-applications
        method: GET
        description: List deployed applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-application
        method: GET
        description: Get application details
        inputParameters:
        - name: appName
          in: path
          type: string
          required: true
          description: Application name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: start-application
        method: POST
        description: Start an application
        inputParameters:
        - name: appName
          in: path
          type: string
          required: true
          description: Application name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: stop-application
        method: POST
        description: Stop an application
        inputParameters:
        - name: appName
          in: path
          type: string
          required: true
          description: Application name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: restart-application
        method: POST
        description: Restart an application
        inputParameters:
        - name: appName
          in: path
          type: string
          required: true
          description: Application name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: features
      path: /features
      description: Liberty feature management
      operations:
      - name: list-features
        method: GET
        description: List installed features
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-feature
        method: GET
        description: Get feature details
        inputParameters:
        - name: featureName
          in: path
          type: string
          required: true
          description: Feature symbolic name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: logging
      path: /logging
      description: Log access and configuration
      operations:
      - name: get-log-config
        method: GET
        description: Get logging configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-log-config
        method: PUT
        description: Update logging configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-log-messages
        method: GET
        description: Get recent log messages
        inputParameters:
        - name: maxMessages
          in: query
          type: integer
          required: false
          description: Maximum messages to return
        - name: level
          in: query
          type: string
          required: false
          description: Minimum log level
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitoring
      path: /monitoring
      description: Server monitoring and metrics
      operations:
      - name: get-metrics
        method: GET
        description: Get MicroProfile Metrics data
        inputParameters:
        - name: scope
          in: query
          type: string
          required: false
          description: Metrics scope (base, vendor, application)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-health
        method: GET
        description: Get MicroProfile Health check results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: rest-connector
    baseUri: https://localhost:9443/IBMJMXConnectorREST/api
    description: JMX REST Connector for Liberty server MBean access
    authentication:
      type: basic
      username: '{{LIBERTY_USERNAME}}'
      password: '{{LIBERTY_PASSWORD}}'
    resources:
    - name: mbeans
      path: /mbeans
      description: JMX MBean operations
      operations:
      - name: list-mbeans
        method: GET
        description: List registered MBeans
        inputParameters:
        - name: objectName
          in: query
          type: string
          required: false
          description: ObjectName pattern filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-mbean-info
        method: GET
        description: Get MBean metadata
        inputParameters:
        - name: objectName
          in: path
          type: string
          required: true
          description: JMX ObjectName
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-mbean-attributes
        method: GET
        description: Get MBean attribute values
        inputParameters:
        - name: objectName
          in: path
          type: string
          required: true
          description: JMX ObjectName
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: invoke-mbean-operation
        method: POST
        description: Invoke an MBean operation
        inputParameters:
        - name: objectName
          in: path
          type: string
          required: true
          description: JMX ObjectName
        - name: operationName
          in: path
          type: string
          required: true
          description: Operation name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: notifications
      path: /notifications
      description: JMX notification subscriptions
      operations:
      - name: list-notification-subscriptions
        method: GET
        description: List notification subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-notification-subscription
        method: POST
        description: Subscribe to MBean notifications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            objectName: '{{tools.objectName}}'
      - name: get-notifications
        method: GET
        description: Get pending notifications
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-notification-subscription
        method: DELETE
        description: Delete a notification subscription
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: collective-controller
    baseUri: https://localhost:9443/ibm/api/collective
    description: Liberty Collective Controller REST API
    authentication:
      type: basic
      username: '{{LIBERTY_USERNAME}}'
      password: '{{LIBERTY_PASSWORD}}'
    resources:
    - name: members
      path: /members
      description: Collective member management
      operations:
      - name: list-members
        method: GET
        description: List collective members
        inputParameters:
        - name: status
          in: query
          type: string
          required: false
          description: Filter by member status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-member
        method: GET
        description: Get member details
        inputParameters:
        - name: memberName
          in: path
          type: string
          required: true
          description: Member server name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: start-member
        method: POST
        description: Start a collective member
        inputParameters:
        - name: memberName
          in: path
          type: string
          required: true
          description: Member server name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: stop-member
        method: POST
        description: Stop a collective member
        inputParameters:
        - name: memberName
          in: path
          type: string
          required: true
          description: Member server name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clusters
      path: /clusters
      description: Cluster management
      operations:
      - name: list-clusters
        method: GET
        description: List clusters in the collective
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-cluster
        method: POST
        description: Create a cluster
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: get-cluster
        method: GET
        description: Get cluster details
        inputParameters:
        - name: clusterName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: start-cluster
        method: POST
        description: Start all cluster members
        inputParameters:
        - name: clusterName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: stop-cluster
        method: POST
        description: Stop all cluster members
        inputParameters:
        - name: clusterName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: scaling
      path: /scaling/policies
      description: Auto-scaling policy management
      operations:
      - name: list-scaling-policies
        method: GET
        description: List scaling policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-scaling-policy
        method: POST
        description: Create a scaling policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            clusterName: '{{tools.clusterName}}'
    - name: controller
      path: /controller
      description: Collective controller operations
      operations:
      - name: get-controller-info
        method: GET
        description: Get controller information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: server-admin-api
    description: Unified REST API for WebSphere server administration.
    resources:
    - path: /v1/applications
      name: applications
      description: Application lifecycle management across WAS and Liberty
      operations:
      - method: GET
        name: list-was-applications
        description: List applications on traditional WAS
        call: admin-rest.list-applications
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-liberty-applications
        description: List applications on Liberty
        call: liberty-admin.list-applications
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/servers
      name: servers
      description: Server management
      operations:
      - method: GET
        name: list-servers
        description: List WAS servers
        call: admin-rest.list-servers
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-liberty-server-info
        description: Get Liberty server information
        call: liberty-admin.get-server-info
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clusters
      name: clusters
      description: Cluster management
      operations:
      - method: GET
        name: list-was-clusters
        description: List WAS clusters
        call: admin-rest.list-clusters
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-collective-clusters
        description: List Liberty collective clusters
        call: collective-controller.list-clusters
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/members
      name: members
      description: Collective member management
      operations:
      - method: GET
        name: list-members
        description: List collective members
        call: collective-controller.list-members
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/configuration
      name: configuration
      description: Server configuration
      operations:
      - method: GET
        name: get-was-config
        description: List WAS configuration resource types
        call: admin-rest.list-config-resources
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-liberty-config
        description: Get Liberty server configuration
        call: liberty-admin.get-server-config
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mbeans
      name: mbeans
      description: JMX MBean access
      operations:
      - method: GET
        name: list-mbeans
        description: List registered MBeans
        call: rest-connector.list-mbeans
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/features
      name: features
      description: Liberty feature management
      operations:
      - method: GET
        name: list-features
        description: List installed Liberty features
        call: liberty-admin.list-features
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: server-admin-mcp
    transport: http
    description: MCP server for AI-assisted WebSphere server administration.
    tools:
    - name: was-list-applications
      description: List deployed applications on traditional WebSphere
      hints:
        readOnly: true
        openWorld: true
      call: admin-rest.list-applications
      outputParameters:
      - type: object
        mapping: $.
    - name: liberty-list-applications
      description: List deployed applications on Liberty
      hints:
        readOnly: true
        openWorld: true
      call: liberty-admin.list-applications
      outputParameters:
      - type: object
        mapping: $.
    - name: was-list-servers
      description: List WAS servers in the cell
      hints:
        readOnly: true
      call: admin-rest.list-servers
      outputParameters:
      - type: object
        mapping: $.
    - name: liberty-get-server-info
      description: Get Liberty server runtime information
      hints:
        readOnly: true
      call: liberty-admin.get-server-info
      outputParameters:
      - type: object
        mapping: $.
    - name: was-start-server
      description: Start a WAS server
      hints:
        readOnly: false
        idempotent: true
      call: admin-rest.start-server
      with:
        serverName: tools.serverName
      outputParameters:
      - type: object
        mapping: $.
    - name: was-stop-server
      description: Stop a WAS server
      hints:
        readOnly: false
        idempotent: true
      call: admin-rest.stop-server
      with:
        serverName: tools.serverName
      outputParameters:
      - type: object
        mapping: $.
    - name: list-collective-members
      description: List Liberty collective members
      hints:
        readOnly: true
      call: collective-controller.list-members
      outputParameters:
      - type: object
        mapping: $.
    - name: list-collective-clusters
      description: List clusters in Liberty collective
      hints:
        readOnly: true
      call: collective-controller.list-clusters
      outputParameters:
      - type: object
        mapping: $.
    - name: get-controller-info
      description: Get collective controller information
      hints:
        readOnly: true
      call: collective-controller.get-controller-info
      outputParameters:
      - type: object
        mapping: $.
    - name: list-mbeans
      description: List JMX MBeans via REST connector
      hints:
        readOnly: true
      call: rest-connector.list-mbeans
      outputParameters:
      - type: object
        mapping: $.
    - name: list-features
      description: List installed Liberty features
      hints:
        readOnly: true
      call: liberty-admin.list-features
      outputParameters:
      - type: object
        mapping: $.
    - name: get-liberty-config
      description: Get Liberty server configuration
      hints:
        readOnly: true
      call: liberty-admin.get-server-config
      outputParameters:
      - type: object
        mapping: $.
    - name: get-was-health
      description: Get WAS server health status
      hints:
        readOnly: true
      call: admin-rest.get-health-status
      outputParameters:
      - type: object
        mapping: $.
    - name: get-liberty-health
      description: Get Liberty health check results
      hints:
        readOnly: true
      call: liberty-admin.get-health
      outputParameters:
      - type: object
        mapping: $.
