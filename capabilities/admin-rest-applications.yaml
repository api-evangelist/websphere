naftiko: 1.0.0-alpha2
info:
  label: WebSphere Application Server Admin REST API — Applications
  description: 'WebSphere Application Server Admin REST API — Applications. 7 operations. Lead operation: List Deployed Applications.
    Self-contained Naftiko capability covering one Websphere business surface.'
  tags:
  - Websphere
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEBSPHERE_API_KEY: WEBSPHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-rest-applications
    baseUri: https://localhost:9443/ibm/api
    description: WebSphere Application Server Admin REST API — Applications business capability. Self-contained, no shared
      references.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: List Deployed Applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by application status
      - name: deployapplication
        method: POST
        description: Deploy a New Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: applications-appName
      path: /applications/{appName}
      operations:
      - name: getapplication
        method: GET
        description: Get Application Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapplication
        method: PUT
        description: Update Application Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: uninstallapplication
        method: DELETE
        description: Uninstall an Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications-appName-start
      path: /applications/{appName}/start
      operations:
      - name: startapplication
        method: POST
        description: Start an Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications-appName-stop
      path: /applications/{appName}/stop
      operations:
      - name: stopapplication
        method: POST
        description: Stop an Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: LtpaToken2
      value: '{{env.WEBSPHERE_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: admin-rest-applications-rest
    port: 8080
    description: REST adapter for WebSphere Application Server Admin REST API — Applications. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/applications
      name: applications
      description: REST surface for applications.
      operations:
      - method: GET
        name: listapplications
        description: List Deployed Applications
        call: admin-rest-applications.listapplications
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: deployapplication
        description: Deploy a New Application
        call: admin-rest-applications.deployapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications/{appname}
      name: applications-appname
      description: REST surface for applications-appName.
      operations:
      - method: GET
        name: getapplication
        description: Get Application Details
        call: admin-rest-applications.getapplication
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapplication
        description: Update Application Configuration
        call: admin-rest-applications.updateapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: uninstallapplication
        description: Uninstall an Application
        call: admin-rest-applications.uninstallapplication
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications/{appname}/start
      name: applications-appname-start
      description: REST surface for applications-appName-start.
      operations:
      - method: POST
        name: startapplication
        description: Start an Application
        call: admin-rest-applications.startapplication
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications/{appname}/stop
      name: applications-appname-stop
      description: REST surface for applications-appName-stop.
      operations:
      - method: POST
        name: stopapplication
        description: Stop an Application
        call: admin-rest-applications.stopapplication
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-rest-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for WebSphere Application Server Admin REST API — Applications. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-deployed-applications
      description: List Deployed Applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-rest-applications.listapplications
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: deploy-new-application
      description: Deploy a New Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-rest-applications.deployapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-application-details
      description: Get Application Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-rest-applications.getapplication
      outputParameters:
      - type: object
        mapping: $.
    - name: update-application-configuration
      description: Update Application Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-rest-applications.updateapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: uninstall-application
      description: Uninstall an Application
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-rest-applications.uninstallapplication
      outputParameters:
      - type: object
        mapping: $.
    - name: start-application
      description: Start an Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-rest-applications.startapplication
      outputParameters:
      - type: object
        mapping: $.
    - name: stop-application
      description: Stop an Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-rest-applications.stopapplication
      outputParameters:
      - type: object
        mapping: $.
