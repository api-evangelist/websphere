naftiko: 1.0.0-alpha2
info:
  label: WebSphere Messaging and Integration
  description: Workflow for managing IBM MQ messaging infrastructure including queue management, message operations, channels,
    and topics for integration architects and middleware administrators.
  tags:
  - IBM MQ
  - Messaging
  - Integration
  - Queue Management
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    MQ_USERNAME: MQ_USERNAME
    MQ_PASSWORD: MQ_PASSWORD
capability:
  consumes:
  - type: http
    namespace: mq-rest
    baseUri: https://localhost:9443/ibmmq/rest/v2
    description: IBM MQ REST API for messaging and administration
    authentication:
      type: basic
      username: '{{MQ_USERNAME}}'
      password: '{{MQ_PASSWORD}}'
    resources:
    - name: queue-managers
      path: /admin/qmgr
      description: Queue manager administration
      operations:
      - name: list-queue-managers
        method: GET
        description: List queue managers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-queue-manager
        method: GET
        description: Get queue manager details
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: queues
      path: /admin/qmgr/{qmgrName}/queue
      description: Queue administration
      operations:
      - name: list-queues
        method: GET
        description: List queues on a queue manager
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        - name: name
          in: query
          type: string
          required: false
          description: Queue name filter
        - name: type
          in: query
          type: string
          required: false
          description: Queue type filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-queue
        method: POST
        description: Create a new queue
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            type: '{{tools.type}}'
      - name: get-queue
        method: GET
        description: Get queue details
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        - name: queueName
          in: path
          type: string
          required: true
          description: Queue name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-queue
        method: DELETE
        description: Delete a queue
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        - name: queueName
          in: path
          type: string
          required: true
          description: Queue name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: messages
      path: /messaging/qmgr/{qmgrName}/queue/{queueName}/message
      description: Message operations
      operations:
      - name: send-message
        method: POST
        description: Send a message to a queue
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        - name: queueName
          in: path
          type: string
          required: true
          description: Queue name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: browse-messages
        method: GET
        description: Browse messages on a queue
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        - name: queueName
          in: path
          type: string
          required: true
          description: Queue name
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum messages to browse
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: receive-message
        method: DELETE
        description: Destructively get a message from a queue
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        - name: queueName
          in: path
          type: string
          required: true
          description: Queue name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channels
      path: /admin/qmgr/{qmgrName}/channel
      description: Channel administration
      operations:
      - name: list-channels
        method: GET
        description: List channels
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-channel
        method: POST
        description: Create a channel
        inputParameters:
        - name: qmgrName
          in: path
          type: string
          required: true
          description: Queue manager name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            type: '{{tools.type}}'
  exposes:
  - type: rest
    port: 8081
    namespace: messaging-api
    description: Unified REST API for IBM MQ messaging operations.
    resources:
    - path: /v1/queue-managers
      name: queue-managers
      description: Queue manager operations
      operations:
      - method: GET
        name: list-queue-managers
        description: List queue managers
        call: mq-rest.list-queue-managers
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-queue-manager
        description: Get queue manager details
        call: mq-rest.get-queue-manager
        with:
          qmgrName: rest.qmgrName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queues
      name: queues
      description: Queue management
      operations:
      - method: GET
        name: list-queues
        description: List queues
        call: mq-rest.list-queues
        with:
          qmgrName: rest.qmgrName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/messages
      name: messages
      description: Message operations
      operations:
      - method: GET
        name: browse-messages
        description: Browse messages on a queue
        call: mq-rest.browse-messages
        with:
          qmgrName: rest.qmgrName
          queueName: rest.queueName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/channels
      name: channels
      description: Channel management
      operations:
      - method: GET
        name: list-channels
        description: List channels
        call: mq-rest.list-channels
        with:
          qmgrName: rest.qmgrName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: messaging-mcp
    transport: http
    description: MCP server for AI-assisted IBM MQ messaging management.
    tools:
    - name: list-queue-managers
      description: List available queue managers
      hints:
        readOnly: true
      call: mq-rest.list-queue-managers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-queue-manager
      description: Get queue manager details
      hints:
        readOnly: true
      call: mq-rest.get-queue-manager
      with:
        qmgrName: tools.qmgrName
      outputParameters:
      - type: object
        mapping: $.
    - name: list-queues
      description: List queues on a queue manager
      hints:
        readOnly: true
      call: mq-rest.list-queues
      with:
        qmgrName: tools.qmgrName
      outputParameters:
      - type: object
        mapping: $.
    - name: get-queue
      description: Get queue details
      hints:
        readOnly: true
      call: mq-rest.get-queue
      with:
        qmgrName: tools.qmgrName
        queueName: tools.queueName
      outputParameters:
      - type: object
        mapping: $.
    - name: create-queue
      description: Create a new queue
      hints:
        readOnly: false
      call: mq-rest.create-queue
      with:
        qmgrName: tools.qmgrName
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-queue
      description: Delete a queue
      hints:
        readOnly: false
        destructive: true
      call: mq-rest.delete-queue
      with:
        qmgrName: tools.qmgrName
        queueName: tools.queueName
      outputParameters:
      - type: object
        mapping: $.
    - name: browse-messages
      description: Browse messages on a queue non-destructively
      hints:
        readOnly: true
      call: mq-rest.browse-messages
      with:
        qmgrName: tools.qmgrName
        queueName: tools.queueName
      outputParameters:
      - type: object
        mapping: $.
    - name: send-message
      description: Send a message to a queue
      hints:
        readOnly: false
      call: mq-rest.send-message
      with:
        qmgrName: tools.qmgrName
        queueName: tools.queueName
      outputParameters:
      - type: object
        mapping: $.
    - name: list-channels
      description: List channels on a queue manager
      hints:
        readOnly: true
      call: mq-rest.list-channels
      with:
        qmgrName: tools.qmgrName
      outputParameters:
      - type: object
        mapping: $.
