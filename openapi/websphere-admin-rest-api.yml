openapi: 3.1.0
info:
  title: WebSphere Application Server Admin REST API
  description: >-
    REST API for administrative operations on IBM WebSphere Application Server
    including deployment, configuration, monitoring, and server management.
    Starting with version 9.0.0.1, Swagger documentation can be discovered
    and exposed for deployed RESTful endpoints.
  version: 9.0.5
  license:
    name: IBM International License Agreement
    url: https://www.ibm.com/legal/terms
  contact:
    name: IBM Support
    url: https://www.ibm.com/mysupport
externalDocs:
  description: IBM WebSphere Application Server Documentation
  url: https://www.ibm.com/docs/en/was/9.0.5?topic=overview-administrative-rest-api
servers:
- url: https://localhost:9443/ibm/api
  description: Default WebSphere Admin API Server
security:
- basicAuth: []
tags:
- name: Applications
  description: Application deployment and lifecycle management
- name: Servers
  description: Server configuration and management
- name: Clusters
  description: Cluster management operations
- name: Nodes
  description: Node management operations
- name: Configuration
  description: Server configuration management
- name: Monitoring
  description: Performance monitoring and health checks
- name: Security
  description: Security configuration and management
- name: Resources
  description: Resource management including data sources and JMS
paths:
  /explorer:
    get:
      operationId: getApiExplorer
      summary: Access the Api Explorer
      description: Returns the API Explorer interface for discovering available REST API endpoints.
      tags:
      - Configuration
      responses:
        '200':
          description: API Explorer HTML interface
          content:
            text/html:
              schema:
                type: string
              examples:
                Getapiexplorer200Example:
                  summary: Default getApiExplorer 200 response
                  x-microcks-default: true
                  value: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /config:
    get:
      operationId: listConfigResources
      summary: List Configuration Resource Types
      description: Returns a list of available configuration resource types that can be managed through the REST API.
      tags:
      - Configuration
      responses:
        '200':
          description: List of configuration resource types
          content:
            application/json:
              schema:
                type: object
                properties:
                  resourceTypes:
                    type: array
                    items:
                      $ref: '#/components/schemas/ResourceType'
              examples:
                Listconfigresources200Example:
                  summary: Default listConfigResources 200 response
                  x-microcks-default: true
                  value:
                    resourceTypes:
                    - name: Example Title
                      description: A sample description.
                      href: https://www.example.com
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /config/{resourceType}:
    get:
      operationId: getConfigResources
      summary: List Resources of a Specific Type
      description: Returns a collection of configuration resources of the specified type.
      tags:
      - Configuration
      parameters:
      - $ref: '#/components/parameters/resourceType'
      - $ref: '#/components/parameters/depth'
      responses:
        '200':
          description: Collection of configuration resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigResource'
              examples:
                Getconfigresources200Example:
                  summary: Default getConfigResources 200 response
                  x-microcks-default: true
                  value:
                  - id: abc123
                    type: example_value
                    name: Example Title
                    attributes: example_value
                    links:
                    - rel: example_value
                      href: https://www.example.com
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createConfigResource
      summary: Create a New Configuration Resource
      description: Creates a new configuration resource of the specified type.
      tags:
      - Configuration
      parameters:
      - $ref: '#/components/parameters/resourceType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigResource'
            examples:
              CreateconfigresourceRequestExample:
                summary: Default createConfigResource request
                x-microcks-default: true
                value:
                  id: abc123
                  type: example_value
                  name: Example Title
                  attributes: example_value
                  links:
                  - rel: example_value
                    href: https://www.example.com
      responses:
        '201':
          description: Configuration resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResource'
              examples:
                Createconfigresource201Example:
                  summary: Default createConfigResource 201 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    type: example_value
                    name: Example Title
                    attributes: example_value
                    links:
                    - rel: example_value
                      href: https://www.example.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /config/{resourceType}/{resourceId}:
    get:
      operationId: getConfigResource
      summary: Get a Specific Configuration Resource
      description: Returns the configuration details for a specific resource.
      tags:
      - Configuration
      parameters:
      - $ref: '#/components/parameters/resourceType'
      - $ref: '#/components/parameters/resourceId'
      - $ref: '#/components/parameters/depth'
      responses:
        '200':
          description: Configuration resource details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResource'
              examples:
                Getconfigresource200Example:
                  summary: Default getConfigResource 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    type: example_value
                    name: Example Title
                    attributes: example_value
                    links:
                    - rel: example_value
                      href: https://www.example.com
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updateConfigResource
      summary: Update a Configuration Resource
      description: Updates an existing configuration resource.
      tags:
      - Configuration
      parameters:
      - $ref: '#/components/parameters/resourceType'
      - $ref: '#/components/parameters/resourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigResource'
            examples:
              UpdateconfigresourceRequestExample:
                summary: Default updateConfigResource request
                x-microcks-default: true
                value:
                  id: abc123
                  type: example_value
                  name: Example Title
                  attributes: example_value
                  links:
                  - rel: example_value
                    href: https://www.example.com
      responses:
        '200':
          description: Configuration resource updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResource'
              examples:
                Updateconfigresource200Example:
                  summary: Default updateConfigResource 200 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    type: example_value
                    name: Example Title
                    attributes: example_value
                    links:
                    - rel: example_value
                      href: https://www.example.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteConfigResource
      summary: Delete a Configuration Resource
      description: Deletes a specific configuration resource.
      tags:
      - Configuration
      parameters:
      - $ref: '#/components/parameters/resourceType'
      - $ref: '#/components/parameters/resourceId'
      responses:
        '204':
          description: Configuration resource deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /applications:
    get:
      operationId: listApplications
      summary: List Deployed Applications
      description: Returns a list of all applications deployed on the server or cell.
      tags:
      - Applications
      parameters:
      - name: status
        in: query
        description: Filter by application status
        schema:
          type: string
          enum:
          - started
          - stopped
          - unknown
        example: started
      responses:
        '200':
          description: List of deployed applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
              examples:
                Listapplications200Example:
                  summary: Default listApplications 200 response
                  x-microcks-default: true
                  value:
                  - name: Example Title
                    status: started
                    contextRoot: example_value
                    targetServer: example_value
                    deployedModules:
                    - name: Example Title
                      type: web
                      uri: example_value
                    lastModified: '2026-01-15T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: deployApplication
      summary: Deploy a New Application
      description: Deploys a new application to the server or cluster.
      tags:
      - Applications
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The application archive (EAR, WAR, or JAR)
                name:
                  type: string
                  description: Application name
                contextRoot:
                  type: string
                  description: Context root for web modules
                targetServer:
                  type: string
                  description: Target server or cluster name
              required:
              - file
              - name
            examples:
              DeployapplicationRequestExample:
                summary: Default deployApplication request
                x-microcks-default: true
                value:
                  file: example_value
                  name: Example Title
                  contextRoot: example_value
                  targetServer: example_value
      responses:
        '201':
          description: Application deployed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
              examples:
                Deployapplication201Example:
                  summary: Default deployApplication 201 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: started
                    contextRoot: example_value
                    targetServer: example_value
                    deployedModules:
                    - name: Example Title
                      type: web
                      uri: example_value
                    lastModified: '2026-01-15T10:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Application already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Deployapplication409Example:
                  summary: Default deployApplication 409 response
                  x-microcks-default: true
                  value:
                    code: example_value
                    message: example_value
                    details: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /applications/{appName}:
    get:
      operationId: getApplication
      summary: Get Application Details
      description: Returns details of a specific deployed application.
      tags:
      - Applications
      parameters:
      - $ref: '#/components/parameters/appName'
      responses:
        '200':
          description: Application details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
              examples:
                Getapplication200Example:
                  summary: Default getApplication 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: started
                    contextRoot: example_value
                    targetServer: example_value
                    deployedModules:
                    - name: Example Title
                      type: web
                      uri: example_value
                    lastModified: '2026-01-15T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updateApplication
      summary: Update Application Configuration
      description: Updates the configuration of a deployed application.
      tags:
      - Applications
      parameters:
      - $ref: '#/components/parameters/appName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Application'
            examples:
              UpdateapplicationRequestExample:
                summary: Default updateApplication request
                x-microcks-default: true
                value:
                  name: Example Title
                  status: started
                  contextRoot: example_value
                  targetServer: example_value
                  deployedModules:
                  - name: Example Title
                    type: web
                    uri: example_value
                  lastModified: '2026-01-15T10:30:00Z'
      responses:
        '200':
          description: Application updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
              examples:
                Updateapplication200Example:
                  summary: Default updateApplication 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: started
                    contextRoot: example_value
                    targetServer: example_value
                    deployedModules:
                    - name: Example Title
                      type: web
                      uri: example_value
                    lastModified: '2026-01-15T10:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: uninstallApplication
      summary: Uninstall an Application
      description: Uninstalls and removes a deployed application.
      tags:
      - Applications
      parameters:
      - $ref: '#/components/parameters/appName'
      responses:
        '204':
          description: Application uninstalled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /applications/{appName}/start:
    post:
      operationId: startApplication
      summary: Start an Application
      description: Starts a deployed application.
      tags:
      - Applications
      parameters:
      - $ref: '#/components/parameters/appName'
      responses:
        '200':
          description: Application started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationStatus'
              examples:
                Startapplication200Example:
                  summary: Default startApplication 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: started
                    message: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Application is already started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Startapplication409Example:
                  summary: Default startApplication 409 response
                  x-microcks-default: true
                  value:
                    code: example_value
                    message: example_value
                    details: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /applications/{appName}/stop:
    post:
      operationId: stopApplication
      summary: Stop an Application
      description: Stops a running application.
      tags:
      - Applications
      parameters:
      - $ref: '#/components/parameters/appName'
      responses:
        '200':
          description: Application stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationStatus'
              examples:
                Stopapplication200Example:
                  summary: Default stopApplication 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: started
                    message: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /servers:
    get:
      operationId: listServers
      summary: List Servers
      description: Returns a list of all servers in the cell.
      tags:
      - Servers
      responses:
        '200':
          description: List of servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Server'
              examples:
                Listservers200Example:
                  summary: Default listServers 200 response
                  x-microcks-default: true
                  value:
                  - name: Example Title
                    nodeName: example_value
                    clusterName: example_value
                    status: STARTED
                    serverType: APPLICATION_SERVER
                    pid: '500123'
                    ports:
                    - name: Example Title
                      port: 10
                      host: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /servers/{serverName}:
    get:
      operationId: getServer
      summary: Get Server Details
      description: Returns details of a specific server.
      tags:
      - Servers
      parameters:
      - $ref: '#/components/parameters/serverName'
      responses:
        '200':
          description: Server details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
              examples:
                Getserver200Example:
                  summary: Default getServer 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    nodeName: example_value
                    clusterName: example_value
                    status: STARTED
                    serverType: APPLICATION_SERVER
                    pid: '500123'
                    ports:
                    - name: Example Title
                      port: 10
                      host: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /servers/{serverName}/start:
    post:
      operationId: startServer
      summary: Start a Server
      description: Starts the specified application server.
      tags:
      - Servers
      parameters:
      - $ref: '#/components/parameters/serverName'
      responses:
        '200':
          description: Server started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerStatus'
              examples:
                Startserver200Example:
                  summary: Default startServer 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: STARTED
                    message: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /servers/{serverName}/stop:
    post:
      operationId: stopServer
      summary: Stop a Server
      description: Stops the specified application server.
      tags:
      - Servers
      parameters:
      - $ref: '#/components/parameters/serverName'
      responses:
        '200':
          description: Server stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerStatus'
              examples:
                Stopserver200Example:
                  summary: Default stopServer 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: STARTED
                    message: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters:
    get:
      operationId: listClusters
      summary: List Clusters
      description: Returns a list of all clusters in the cell.
      tags:
      - Clusters
      responses:
        '200':
          description: List of clusters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cluster'
              examples:
                Listclusters200Example:
                  summary: Default listClusters 200 response
                  x-microcks-default: true
                  value:
                  - name: Example Title
                    status: running
                    members:
                    - serverName: example_value
                      nodeName: example_value
                      status: example_value
                      weight: 10
                    preferLocal: true
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{clusterName}:
    get:
      operationId: getCluster
      summary: Get Cluster Details
      description: Returns details of a specific cluster.
      tags:
      - Clusters
      parameters:
      - $ref: '#/components/parameters/clusterName'
      responses:
        '200':
          description: Cluster details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
              examples:
                Getcluster200Example:
                  summary: Default getCluster 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: running
                    members:
                    - serverName: example_value
                      nodeName: example_value
                      status: example_value
                      weight: 10
                    preferLocal: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{clusterName}/start:
    post:
      operationId: startCluster
      summary: Start a Cluster
      description: Starts all members of the specified cluster.
      tags:
      - Clusters
      parameters:
      - $ref: '#/components/parameters/clusterName'
      responses:
        '200':
          description: Cluster started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatus'
              examples:
                Startcluster200Example:
                  summary: Default startCluster 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: example_value
                    membersStarted: 10
                    membersTotal: 10
                    message: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{clusterName}/stop:
    post:
      operationId: stopCluster
      summary: Stop a Cluster
      description: Stops all members of the specified cluster.
      tags:
      - Clusters
      parameters:
      - $ref: '#/components/parameters/clusterName'
      responses:
        '200':
          description: Cluster stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatus'
              examples:
                Stopcluster200Example:
                  summary: Default stopCluster 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    status: example_value
                    membersStarted: 10
                    membersTotal: 10
                    message: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /nodes:
    get:
      operationId: listNodes
      summary: List Nodes
      description: Returns a list of all nodes in the cell.
      tags:
      - Nodes
      responses:
        '200':
          description: List of nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Node'
              examples:
                Listnodes200Example:
                  summary: Default listNodes 200 response
                  x-microcks-default: true
                  value:
                  - name: Example Title
                    hostName: example_value
                    platformOS: example_value
                    servers:
                    - example_value
                    synchronized: true
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /nodes/{nodeName}:
    get:
      operationId: getNode
      summary: Get Node Details
      description: Returns details of a specific node.
      tags:
      - Nodes
      parameters:
      - $ref: '#/components/parameters/nodeName'
      responses:
        '200':
          description: Node details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
              examples:
                Getnode200Example:
                  summary: Default getNode 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    hostName: example_value
                    platformOS: example_value
                    servers:
                    - example_value
                    synchronized: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /nodes/{nodeName}/sync:
    post:
      operationId: syncNode
      summary: Synchronize a Node
      description: Triggers configuration synchronization for the specified node.
      tags:
      - Nodes
      parameters:
      - $ref: '#/components/parameters/nodeName'
      responses:
        '200':
          description: Node synchronization initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
              examples:
                Syncnode200Example:
                  summary: Default syncNode 200 response
                  x-microcks-default: true
                  value:
                    status: example_value
                    message: example_value
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /monitoring/performance:
