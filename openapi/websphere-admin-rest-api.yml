components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication using WebSphere administrative credentials
    ltpaToken:
      type: apiKey
      in: cookie
      name: LtpaToken2
      description: LTPA token-based authentication
  parameters:
    resourceType:
      name: resourceType
      in: path
      required: true
      description: The type of configuration resource
      schema:
        type: string
    resourceId:
      name: resourceId
      in: path
      required: true
      description: The unique identifier of the resource
      schema:
        type: string
    appName:
      name: appName
      in: path
      required: true
      description: Application name
      schema:
        type: string
    serverName:
      name: serverName
      in: path
      required: true
      description: Server name
      schema:
        type: string
    clusterName:
      name: clusterName
      in: path
      required: true
      description: Cluster name
      schema:
        type: string
    nodeName:
      name: nodeName
      in: path
      required: true
      description: Node name
      schema:
        type: string
    depth:
      name: depth
      in: query
      description: Depth of nested resource retrieval
      schema:
        type: integer
        default: 1
        minimum: 0
        maximum: 10
  schemas:
    Application:
      type: object
      properties:
        name:
          type: string
          description: Application name
          example: Example Title
        status:
          type: string
          enum:
          - started
          - stopped
          - unknown
          description: Current application status
          example: started
        contextRoot:
          type: string
          description: Context root for web modules
          example: example_value
        targetServer:
          type: string
          description: Target server or cluster
          example: example_value
        deployedModules:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
                enum:
                - web
                - ejb
                - connector
              uri:
                type: string
          example: []
        lastModified:
          type: string
          format: date-time
          description: Last modification timestamp
          example: '2026-01-15T10:30:00Z'
    ApplicationStatus:
      type: object
      properties:
        name:
          type: string
          example: Example Title
        status:
          type: string
          enum:
          - started
          - stopped
          - starting
          - stopping
          example: started
        message:
          type: string
          example: example_value
    Server:
      type: object
      properties:
        name:
          type: string
          description: Server name
          example: Example Title
        nodeName:
          type: string
          description: Node where the server resides
          example: example_value
        clusterName:
          type: string
          description: Cluster membership
          example: example_value
        status:
          type: string
          enum:
          - STARTED
          - STOPPED
          - STARTING
          - STOPPING
          - UNKNOWN
          example: STARTED
        serverType:
          type: string
          enum:
          - APPLICATION_SERVER
          - WEB_SERVER
          - PROXY_SERVER
          - GENERIC_SERVER
          example: APPLICATION_SERVER
        pid:
          type: integer
          description: Process ID
          example: '500123'
        ports:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              port:
                type: integer
              host:
                type: string
          example: []
    ServerStatus:
      type: object
      properties:
        name:
          type: string
          example: Example Title
        status:
          type: string
          enum:
          - STARTED
          - STOPPED
          - STARTING
          - STOPPING
          example: STARTED
        message:
          type: string
          example: example_value
    Cluster:
      type: object
      properties:
        name:
          type: string
          description: Cluster name
          example: Example Title
        status:
          type: string
          enum:
          - running
          - stopped
          - partial
          example: running
        members:
          type: array
          items:
            type: object
            properties:
              serverName:
                type: string
              nodeName:
                type: string
              status:
                type: string
              weight:
                type: integer
          example: []
        preferLocal:
          type: boolean
          description: Whether to prefer local routing
          example: true
    ClusterStatus:
      type: object
      properties:
        name:
          type: string
          example: Example Title
        status:
          type: string
          example: example_value
        membersStarted:
          type: integer
          example: 10
        membersTotal:
          type: integer
          example: 10
        message:
          type: string
          example: example_value
    Node:
      type: object
      properties:
        name:
          type: string
          description: Node name
          example: Example Title
        hostName:
          type: string
          description: Hostname of the node
          example: example_value
        platformOS:
          type: string
          description: Operating system platform
          example: example_value
        servers:
          type: array
          items:
            type: string
          example: []
        synchronized:
          type: boolean
          description: Whether the node configuration is synchronized
          example: true
    ConfigResource:
      type: object
      properties:
        id:
          type: string
          description: Resource identifier
          example: abc123
        type:
          type: string
          description: Resource type
          example: example_value
        name:
          type: string
          description: Resource display name
          example: Example Title
        attributes:
          type: object
          additionalProperties: true
          description: Resource attributes
          example: example_value
        links:
          type: array
          items:
            type: object
            properties:
              rel:
                type: string
              href:
                type: string
                format: uri
          example: []
    ResourceType:
      type: object
      properties:
        name:
          type: string
          example: Example Title
        description:
          type: string
          example: A sample description.
        href:
          type: string
          format: uri
          example: https://www.example.com
    PerformanceData:
      type: object
      properties:
        module:
          type: string
          description: Performance module name
          example: example_value
        timestamp:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        metrics:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: number
              unit:
                type: string
              type:
                type: string
                enum:
                - counter
                - gauge
                - average
          example: []
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum:
          - UP
          - DOWN
          - DEGRADED
          example: UP
        serverName:
          type: string
          example: example_value
        uptime:
          type: integer
          description: Server uptime in milliseconds
          example: 10
        checks:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum:
                - UP
                - DOWN
              data:
                type: object
                additionalProperties: true
          example: []
    User:
      type: object
      properties:
        uid:
          type: string
          example: '500123'
        displayName:
          type: string
          example: example_value
        email:
          type: string
          format: email
          example: user@example.com
        groups:
          type: array
          items:
            type: string
          example: []
    SecurityRole:
      type: object
      properties:
        name:
          type: string
          example: Example Title
        description:
          type: string
          example: A sample description.
        users:
          type: array
          items:
            type: string
          example: []
        groups:
          type: array
          items:
            type: string
          example: []
    DataSource:
      type: object
      properties:
        name:
          type: string
          description: Data source name
          example: Example Title
        jndiName:
          type: string
          description: JNDI name
          example: example_value
        databaseType:
          type: string
          description: Database type
          example: example_value
        jdbcProvider:
          type: string
          description: JDBC provider name
          example: example_value
        connectionPool:
          type: object
          properties:
            minConnections:
              type: integer
            maxConnections:
              type: integer
            connectionTimeout:
              type: integer
              description: Timeout in seconds
            reapTime:
              type: integer
              description: Reap time in seconds
          example: example_value
        status:
          type: string
          enum:
          - active
          - inactive
          example: active
    Error:
      type: object
      properties:
        code:
          type: string
          example: example_value
        message:
          type: string
          example: example_value
        details:
          type: string
          example: example_value
      required:
      - code
      - message
  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
