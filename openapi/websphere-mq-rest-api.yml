components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication
    tokenAuth:
      type: apiKey
      in: cookie
      name: LtpaToken2
      description: LTPA token authentication
  parameters:
    qmgrName:
      name: qmgrName
      in: path
      required: true
      description: Queue manager name
      schema:
        type: string
    queueName:
      name: queueName
      in: path
      required: true
      description: Queue name
      schema:
        type: string
  schemas:
    QueueManager:
      type: object
      properties:
        name:
          type: string
          description: Queue manager name
          example: Example Title
        state:
          type: string
          enum:
          - running
          - ended
          description: Queue manager state
          example: running
        version:
          type: string
          description: MQ version
          example: example_value
        platform:
          type: string
          description: Platform type
          example: example_value
        commandLevel:
          type: integer
          description: Command level
          example: 10
        connectionCount:
          type: integer
          description: Number of active connections
          example: 10
        description:
          type: string
          example: A sample description.
        maximumMessageLength:
          type: integer
          description: Maximum message length in bytes
          example: 10
    Queue:
      type: object
      properties:
        name:
          type: string
          description: Queue name
          example: Example Title
        type:
          type: string
          enum:
          - local
          - alias
          - remote
          - model
          - cluster
          description: Queue type
          example: local
        description:
          type: string
          example: A sample description.
        maxDepth:
          type: integer
          description: Maximum queue depth
          example: 10
        maxMessageLength:
          type: integer
          description: Maximum message length in bytes
          example: 10
        currentDepth:
          type: integer
          description: Current number of messages on the queue
          example: 10
        inhibitPut:
          type: boolean
          description: Whether put operations are inhibited
          example: true
        inhibitGet:
          type: boolean
          description: Whether get operations are inhibited
          example: true
        persistence:
          type: object
          properties:
            default:
              type: string
              enum:
              - persistent
              - nonPersistent
          example: example_value
        cluster:
          type: object
          properties:
            name:
              type: string
            workloadRank:
              type: integer
            workloadPriority:
              type: integer
          example: example_value
        status:
          type: object
          properties:
            currentDepth:
              type: integer
            openInputCount:
              type: integer
            openOutputCount:
              type: integer
            lastGetDateTime:
              type: string
              format: date-time
            lastPutDateTime:
              type: string
              format: date-time
          example: example_value
    QueueCreate:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Queue name
          example: Example Title
        type:
          type: string
          enum:
          - local
          - alias
          - remote
          - model
          default: local
          example: local
        description:
          type: string
          example: A sample description.
        maxDepth:
          type: integer
          default: 5000
          example: 10
        maxMessageLength:
          type: integer
          default: 4194304
          example: 10
        persistence:
          type: object
          properties:
            default:
              type: string
              enum:
              - persistent
              - nonPersistent
          example: example_value
    QueueUpdate:
      type: object
      properties:
        description:
          type: string
          example: A sample description.
        maxDepth:
          type: integer
          example: 10
        maxMessageLength:
          type: integer
          example: 10
        inhibitPut:
          type: boolean
          example: true
        inhibitGet:
          type: boolean
          example: true
    Message:
      type: object
      properties:
        messageId:
          type: string
          description: Message identifier
          example: '500123'
        correlationId:
          type: string
          description: Correlation identifier
          example: '500123'
        putDateTime:
          type: string
          format: date-time
          description: Time the message was put
          example: '2026-01-15T10:30:00Z'
        persistence:
          type: string
          enum:
          - persistent
          - nonPersistent
          example: persistent
        replyToQueue:
          type: string
          description: Reply-to queue name
          example: example_value
        replyToQueueManager:
          type: string
          description: Reply-to queue manager name
          example: example_value
        expiry:
          type: integer
          description: Message expiry in tenths of a second
          example: 10
        body:
          description: Message body content
          example: example_value
        format:
          type: string
          description: Message format
          example: example_value
    Topic:
      type: object
      properties:
        name:
          type: string
          description: Administrative topic object name
          example: Example Title
        topicString:
          type: string
          description: Topic string
          example: example_value
        description:
          type: string
          example: A sample description.
        type:
          type: string
          enum:
          - local
          - cluster
          example: local
        durableSubscriptions:
          type: string
          enum:
          - allowed
          - inhibited
          example: allowed
        publish:
          type: string
          enum:
          - allowed
          - inhibited
          example: allowed
        subscribe:
          type: string
          enum:
          - allowed
          - inhibited
          example: allowed
    TopicCreate:
      type: object
      required:
      - name
      - topicString
      properties:
        name:
          type: string
          example: Example Title
        topicString:
          type: string
          example: example_value
        description:
          type: string
          example: A sample description.
        type:
          type: string
          enum:
          - local
          - cluster
          default: local
          example: local
    Subscription:
      type: object
      properties:
        id:
          type: string
          description: Subscription identifier
          example: abc123
        name:
          type: string
          description: Subscription name
          example: Example Title
        topicString:
          type: string
          description: Topic string
          example: example_value
        destination:
          type: string
          description: Destination queue name
          example: example_value
        type:
          type: string
          enum:
          - admin
          - api
          example: admin
        durability:
          type: string
          enum:
          - durable
          - nonDurable
          example: durable
    Channel:
      type: object
      properties:
        name:
          type: string
          description: Channel name
          example: Example Title
        type:
          type: string
          enum:
          - sender
          - receiver
          - server
          - requester
          - serverConnection
          - clusterSender
          - clusterReceiver
          - amqp
          example: sender
        description:
          type: string
          example: A sample description.
        connectionName:
          type: string
          description: Connection name (host and port)
          example: example_value
        transmissionQueue:
          type: string
          description: Transmission queue name
          example: example_value
        status:
          type: object
          properties:
            state:
              type: string
              enum:
              - running
              - stopped
              - retrying
              - binding
              - starting
              - stopping
          example: example_value
    ChannelCreate:
      type: object
      required:
      - name
      - type
      properties:
        name:
          type: string
          example: Example Title
        type:
          type: string
          enum:
          - sender
          - receiver
          - server
          - requester
          - serverConnection
          - clusterSender
          - clusterReceiver
          - amqp
          example: sender
        description:
          type: string
          example: A sample description.
        connectionName:
          type: string
          example: example_value
        transmissionQueue:
          type: string
          example: example_value
    Error:
      type: object
      properties:
        error:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              msgId:
                type: string
              explanation:
                type: string
              action:
                type: string
              message:
                type: string
          example: []
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
